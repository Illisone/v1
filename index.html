<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SibXtrim | Снегоходы BRP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <base target="_blank">
</head>
<body>
    <div class="app" id="app">
        <!-- ВИДЕО ФОН -->
        <div class="video-bg">
            <video id="hero-video" autoplay muted loop playsinline preload="auto" poster="images/wp11807979.png">
                <source src="video/hero-bg.mp4" type="video/mp4">
                <source src="video/hero-bg.webm" type="video/webm; codecs=vp9">
            </video>
            <div class="video-overlay"></div>
        </div>

        <!-- СНЕГ -->
        <canvas id="snow-canvas"></canvas>

        <!-- ШАПКА -->
        <div class="header" id="appHeader">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">❄</span>
                    <span>SibXtrim</span>
                </div>
                <div class="header-actions" id="headerActions">
                    <i class="fas fa-search" onclick="showToast('Поиск скоро')"></i>
                    <i class="fas fa-bell" id="notifBell" style="position:relative;" onclick="showNotifications()">
                        <span id="notifDot" style="display:none;"></span>
                    </i>
                    <i class="fas fa-user-shield" id="adminPanelBtn" style="display:none;" onclick="openAdminPanel()"></i>
                </div>
            </div>
            <p class="tagline">Снегоходы BRP | Аксессуары | Сервис</p>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content" id="content"></div>

        <!-- ТАБ-БАР -->
        <div class="tabbar" id="tabbar">
            <div class="tab-item active" data-tab="news">
                <i class="fas fa-newspaper"></i>
                <span>Новости</span>
            </div>
            <div class="tab-item" data-tab="snowmobile">
                <i class="fas fa-box"></i>
                <span>Снегоходы</span>
            </div>
            <div class="tab-item" data-tab="chat">
                <i class="fas fa-comments"></i>
                <span>Чат</span>
                <span class="chat-badge" id="chatBadge"></span>
            </div>
            <div class="tab-item" data-tab="reviews">
                <i class="fas fa-star"></i>
                <span>Отзывы</span>
            </div>
            <div class="tab-item" data-tab="profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </div>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div class="modal" id="productModal">
        <div class="modal-content product-modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <i class="fas fa-times" id="closeModal"></i>
            </div>
            <div class="modal-body-scroll">
                <div id="modalImageWrap" class="modal-image-wrap">
                    <img id="modalImage" src="" alt="" class="modal-image">
                </div>
                <div class="modal-desc" id="modalDesc"></div>
                <div class="modal-spec" id="modalSpec"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-status" id="modalStatus"></div>
                <div id="modalAdminActions" style="display:none;margin-top:10px;display:flex;gap:8px;">
                    <button class="admin-btn glass-button" id="modalEditBtn"><i class="fas fa-edit"></i> Редактировать</button>
                    <button class="admin-btn glass-button danger" id="modalDeleteBtn"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="buy-btn glass-button" id="orderBtn"><i class="fas fa-shopping-cart"></i> Заказать</button>
            </div>
        </div>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3 id="adminModalTitle">Добавить пост</h3>
                <i class="fas fa-times" id="closeAdminModal"></i>
            </div>
            <div class="modal-body-scroll">
                <div id="adminModalBody"></div>
            </div>
        </div>
    </div>

    <div class="reaction-picker" id="reactionPicker" style="display: none;">
        <span class="reaction-option" data-reaction="👍">👍</span>
        <span class="reaction-option" data-reaction="❤️">❤️</span>
        <span class="reaction-option" data-reaction="😂">😂</span>
        <span class="reaction-option" data-reaction="😮">😮</span>
        <span class="reaction-option" data-reaction="😢">😢</span>
    </div>

    <div class="notif-panel" id="notifPanel" style="display:none;">
        <div class="notif-header">
            <span>Уведомления</span>
            <i class="fas fa-times" onclick="document.getElementById('notifPanel').style.display='none'"></i>
        </div>
        <div class="notif-list" id="notifList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
