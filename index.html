<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SibXtrim | Снегоходы BRP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <base target="_blank">
</head>
<body>
    <div class="app" id="app">
        <!-- ВИДЕО ФОН -->
        <div class="video-bg">
            <video id="hero-video" autoplay muted loop playsinline preload="auto" poster="images/wp11807979.png">
                <source src="video/hero-bg.mp4" type="video/mp4">
                <source src="video/hero-bg.webm" type="video/webm; codecs=vp9">
            </video>
            <div class="video-overlay"></div>
        </div>

        <!-- СНЕГ -->
        <canvas id="snow-canvas"></canvas>

        <!-- ШАПКА -->
        <div class="header" id="appHeader">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">❄</span>
                    <span>SibXtrim</span>
                </div>
                <div class="header-actions" id="headerActions">
                    <i class="fas fa-search" id="searchBtn"></i>
                    <i class="fas fa-bell" id="notifBell" style="position:relative;">
                        <span id="notifDot" style="display:none;"></span>
                    </i>
                    <i class="fas fa-user-shield" id="adminPanelBtn" style="display:none;"></i>
                </div>
            </div>
        </div>

        <!-- ПОИСКОВАЯ СТРОКА -->
        <div class="search-bar" id="searchBar">
            <div class="search-inner">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск по каталогу..." autofocus>
                <i class="fas fa-times" id="searchClose"></i>
            </div>
        </div>

        <!-- КОНТЕНТ -->
        <div class="content" id="content"></div>

        <!-- ТАБ-БАР -->
        <div class="tabbar" id="tabbar">
            <div class="tab-item active" data-tab="news">
                <i class="fas fa-newspaper"></i>
                <span>Поступления</span>
            </div>
            <div class="tab-item" data-tab="catalog">
                <i class="fas fa-th-large"></i>
                <span>Каталог</span>
            </div>
            <div class="tab-item" data-tab="chat">
                <i class="fas fa-comments"></i>
                <span>Чат</span>
                <span class="chat-badge" id="chatBadge"></span>
            </div>
            <div class="tab-item" data-tab="reviews">
                <i class="fas fa-star"></i>
                <span>Отзывы</span>
            </div>
            <div class="tab-item" data-tab="profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ТОВАРА -->
    <div class="modal" id="productModal">
        <div class="modal-content product-modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <i class="fas fa-times" id="closeModal"></i>
            </div>
            <div class="modal-body-scroll">
                <div class="modal-image-slider">
                    <div class="slider-container" id="sliderContainer">
                        <div class="slider-track" id="sliderTrack"></div>
                    </div>
                    <div class="slider-nav">
                        <button class="slider-btn prev" id="sliderPrev"><i class="fas fa-chevron-left"></i></button>
                        <span class="slider-counter" id="sliderCounter">1 / 1</span>
                        <button class="slider-btn next" id="sliderNext"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <button class="favorite-btn" id="favoriteBtn"><i class="far fa-heart"></i></button>
                </div>
                <div class="modal-spec" id="modalSpec"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-status" id="modalStatus"></div>
                <div class="modal-condition" id="modalCondition"></div>
                
                <div class="modal-tabs">
                    <button class="modal-tab active" data-tab="desc">Описание</button>
                    <button class="modal-tab" data-tab="chars">Характеристики</button>
                </div>
                <div class="modal-tab-content active" id="tabDesc">
                    <div class="modal-desc" id="modalDesc"></div>
                </div>
                <div class="modal-tab-content" id="tabChars">
                    <div class="modal-chars" id="modalChars"></div>
                </div>
                
                <div id="modalAdminActions" style="display:none;">
                    <button class="admin-btn glass-button" id="modalEditBtn"><i class="fas fa-edit"></i> Редактировать</button>
                    <button class="admin-btn glass-button danger" id="modalDeleteBtn"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="buy-btn glass-button" id="orderBtn"><i class="fas fa-shopping-cart"></i> Заказать</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА АДМИНА -->
    <div class="modal" id="adminModal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3 id="adminModalTitle">Добавить пост</h3>
                <i class="fas fa-times" id="closeAdminModal"></i>
            </div>
            <div class="modal-body-scroll">
                <div id="adminModalBody"></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА УВЕДОМЛЕНИЙ -->
    <div class="modal" id="notifModal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3><i class="fas fa-bell" style="color:#0063c7;"></i> Уведомления</h3>
                <i class="fas fa-times" id="closeNotifModal"></i>
            </div>
            <div class="modal-body-scroll">
                <div class="notif-modal-settings">
                    <div class="setting-row">
                        <div class="setting-left"><i class="fas fa-bell"></i><span>Push-уведомления</span></div>
                        <div class="toggle-switch active" id="pushToggleModal"></div>
                    </div>
                    <div class="setting-row">
                        <div class="setting-left"><i class="fas fa-comment-dots"></i><span>Уведомления чата</span></div>
                        <div class="toggle-switch active" id="chatNotificationsToggleModal"></div>
                    </div>
                </div>
                <div class="notif-list-full" id="notifListFull">
                    <div style="padding:16px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">Нет уведомлений</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ПИКЕР РЕАКЦИЙ -->
    <div class="reaction-picker" id="reactionPicker" style="display: none;">
        <span class="reaction-option" data-reaction="👍">👍</span>
        <span class="reaction-option" data-reaction="❤️">❤️</span>
        <span class="reaction-option" data-reaction="😂">😂</span>
        <span class="reaction-option" data-reaction="😮">😮</span>
        <span class="reaction-option" data-reaction="😢">😢</span>
    </div>

    <!-- ТОСТ -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
